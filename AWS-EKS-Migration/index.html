<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWS EKS Login</title>

<link rel="stylesheet" href="css/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="login-box">

    <div class="logo">

        <i class="fa-brands fa-aws"></i>

        <h1>AWS EKS Migration</h1>

        <p>AI-Ready Microservices Modernization</p>

    </div>

    <form id="loginForm">

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input
            type="text"
            id="username"
            placeholder="Username"
            required>

        </div>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        </div>

        <button type="submit">

            Login

        </button>

        <p id="message"></p>

    </form>

</div>

<script src="js/login.js"></script>

</body>
</html>
